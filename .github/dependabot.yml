version: 2
updates:
  # Maintain Python dependencies
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    # Grouping keeps your PR list clean by putting all "chore" updates in one PR
    groups:
      python-dependencies:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "chore"
    commit-message:
      prefix: "chore"

  # Maintain GitHub Action versions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "chore"
